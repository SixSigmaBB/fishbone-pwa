<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />

  <title>6M Fishbone Diagram</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- =========================
       Header
       ========================= -->
  <header class="app-header">
    <h1>6M Fishbone</h1>

    <div class="header-actions">
      <button id="installBtn" class="btn secondary" hidden>Install</button>
      <button id="saveBtn" class="btn">Save</button>
      <button id="loadBtn" class="btn">Load</button>
      <button id="generateBtn" class="btn cat">Generate Fishbone</button>
    </div>
  </header>

  <!-- =========================
       Main Layout
       ========================= -->
  <main class="layout">

    <!-- =========================
         Inputs / Controls
         ========================= -->
    <section class="inputs">
      <div class="grid">

        <!-- Symptom -->
        <div class="card wide">
          <label class="lbl">Symptom</label>
          <textarea
            id="symptom"
            placeholder="Describe the observed problem or symptom..."
            rows="3"
          ></textarea>
        </div>

        <!-- Man -->
        <div class="card">
          <label class="lbl">Category</label>
          <input id="cat1" class="title" value="Man" />
          <label class="lbl">Items (one per line)</label>
          <textarea id="items1"></textarea>
        </div>

        <!-- Method -->
        <div class="card">
          <label class="lbl">Category</label>
          <input id="cat2" class="title" value="Method" />
          <label class="lbl">Items (one per line)</label>
          <textarea id="items2"></textarea>
        </div>

        <!-- Material -->
        <div class="card">
          <label class="lbl">Category</label>
          <input id="cat3" class="title" value="Material" />
          <label class="lbl">Items (one per line)</label>
          <textarea id="items3"></textarea>
        </div>

        <!-- Measurement -->
        <div class="card">
          <label class="lbl">Category</label>
          <input id="cat4" class="title" value="Measurement" />
          <label class="lbl">Items (one per line)</label>
          <textarea id="items4"></textarea>
        </div>

        <!-- Mother Nature -->
        <div class="card">
          <label class="lbl">Category</label>
          <input id="cat5" class="title" value="Mother Nature" />
          <label class="lbl">Items (one per line)</label>
          <textarea id="items5"></textarea>
        </div>

        <!-- Machine -->
        <div class="card">
          <label class="lbl">Category</label>
          <input id="cat6" class="title" value="Machine" />
          <label class="lbl">Items (one per line)</label>
          <textarea id="items6"></textarea>
        </div>

      </div>
    </section>

    <!-- =========================
         Diagram
         ========================= -->
    <section class="diagram">
      <div class="diagram-header">
        <h2>Fishbone Diagram</h2>
        <div class="diagram-actions">
          <button id="clearBtn" class="btn">Clear</button>
          <button id="downloadBtn" class="btn">Download PNG</button>
        </div>
      </div>

      <svg
        id="fishbone"
        viewBox="0 0 1200 700"
        preserveAspectRatio="xMidYMid meet"
        role="img"
        aria-label="6M Fishbone Diagram"
      ></svg>
    </section>
  </main>

  <!-- =========================
       Footer
       ========================= -->
  <footer class="app-footer">
    <small>© <span id="year"></span> Fishbone PWA</small>
  </footer>

  <!-- =========================
       Scripts
       ========================= -->
  <script src="app.js"></script>
</body>
</html>
